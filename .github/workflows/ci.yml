name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  frontend:
    name: Frontend Checks (React)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Check for errors
        run: |
          cd frontend
          npm run build

  backend:
    name: Backend Checks (Django)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: swappit
          POSTGRES_PASSWORD: swappit
          POSTGRES_DB: swappit_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run Django checks
        env:
          DATABASE_URL: postgresql://swappit:swappit@localhost:5432/swappit_db
          SECRET_KEY: ci-secret-key-for-testing
          DEBUG: True
        run: |
          cd backend
          python manage.py check

      - name: Run migrations check
        env:
          DATABASE_URL: postgresql://swappit:swappit@localhost:5432/swappit_db
          SECRET_KEY: ci-secret-key-for-testing
          DEBUG: True
        run: |
          cd backend
          python manage.py migrate
